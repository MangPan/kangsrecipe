<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Generator</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="card shadow-sm recipe-card">
                    <div class="card-body p-4">
                        <h2 class="text-center mb-3">by 2025810083 강민준</h2>
                        <h2 class="text-center mb-3">Recipe Generator</h2>
                        <p class="text-center text-muted mb-4">
                            Enter 3 ingredients and create a custom recipe.
                        </p>

                        <form action="/generate_recipe" method="post">
                            <div class="mb-3">
                                <label class="form-label">Ingredient 1</label>
                                <input
                                    type="text"
                                    name="ingredient"
                                    class="form-control"
                                    placeholder="e.g. Egg"
                                    required
                                >
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Ingredient 2</label>
                                <input
                                    type="text"
                                    name="ingredient"
                                    class="form-control"
                                    placeholder="e.g. Kimchi"
                                    required
                                >
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Ingredient 3</label>
                                <input
                                    type="text"
                                    name="ingredient"
                                    class="form-control"
                                    placeholder="e.g. Rice"
                                    required
                                >
                            </div>

                            <div class="mb-3">
                                <label for="cuisine" class="form-label">Choose a cuisine</label>
                                <select name="cuisine" id="cuisine" class="form-select">
                                    {% for cuisine in cuisines %}
                                        <option value="{{ cuisine }}">
                                            {{ cuisine if cuisine else "Any Cuisine" }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Dietary Restrictions</label>

                                <div class="row g-2">
                                    {% for restriction in dietary_restrictions %}
                                        <div class="col-6">
                                            <div class="form-check">
                                                <input
                                                    class="form-check-input"
                                                    type="checkbox"
                                                    name="restrictions"
                                                    value="{{ restriction }}"
                                                    id="restriction-{{ loop.index }}"
                                                >
                                                <label
                                                    class="form-check-label small"
                                                    for="restriction-{{ loop.index }}"
                                                >
                                                    {{ restriction }}
                                                </label>
                                            </div>
                                        </div>
                                    {% endfor %}
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="language" class="form-label">Choose a language</label>
                                <select name="language" id="language" class="form-select">
                                    {% for language in languages %}
                                        <option value="{{ language }}">
                                            {{ language }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                Generate Recipe
                            </button>
                        </form>
                    </div>
                </div>

                <p class="text-center text-muted small mt-3">
                    Powered by LLM API
                </p>
            </div>
        </div>
    </div>
</body>
</html>
