<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generated Recipe</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8">
                <div class="card shadow-sm recipe-card">
                    <div class="card-body p-4 p-md-5">
                        <h2 class="text-center mb-4">by 2025810083 강민준</h2>
                        <h2 class="text-center mb-4">Your Recipe</h2>

                        <div class="recipe-content">
                            {{ recipe | safe }}
                        </div>

                        <div class="text-center mt-4">
                            <a href="/" class="btn btn-outline-primary">
                                Generate another recipe
                            </a>
                        </div>
                    </div>
                </div>

                <p class="text-center text-muted small mt-3">
                    Recipe generated from your selected ingredients and preferences.
                </p>
            </div>
        </div>
    </div>
</body>
</html>
